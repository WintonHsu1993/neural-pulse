name: AI 资讯自动更新

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: scripts
        run: npm install

      - name: Fetch and generate
        working-directory: scripts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node fetch-and-generate.js

      - name: Commit and push
        run: |
          git config user.name "Neural Pulse Bot"
          git config user.email "bot@neuralpulse.ai"
          git add data/
          git diff --staged --quiet || git commit -m "Auto update $(date '+%Y-%m-%d %H:%M') CST"
          git push
